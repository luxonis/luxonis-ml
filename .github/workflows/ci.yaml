name: CI

on:
  pull_request:
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  auto-assigner:
    runs-on: ubuntu-latest

    steps:
      - name: Auto-assign
        uses: toshimaru/auto-author-assign@3e19bfc990cb1cf0589dce95e9f75289bb1e22de

  labeler:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
        with:
          ref: ${{ github.head_ref }}

      - name: Labeler
        uses: actions/labeler@f27b608878404679385c85cfa523b85ccb86e213
        with:
          configuration-path: .github/labeler.yaml

  pre-commit:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
        with:
          ref: ${{ github.head_ref }}

      - name: Install pre-commit
        run: python3 -m pip install 'pre-commit<4.0.0'

      - name: Run pre-commit
        uses: pre-commit/action@v3.0.1

  docs:
    needs: pre-commit
    runs-on: ubuntu-latest
    if: false

    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
        with:
          ref: ${{ github.head_ref }}

      - name: Install pydoctor
        run: pip install pydoctor

      - name: Build docs
        run: pydoctor --docformat=epytext luxonis_ml

  type-check:
    needs: pre-commit
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
        with:
          ref: ${{ github.head_ref }}

      - name: Set up Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1
        with:
          python-version: "3.10"
          cache: pip

      - name: Install dependencies
        shell: bash
        env:
          PIP_CONSTRAINT: ${{ github.workspace }}/constraints.txt
        run: |
          echo 'setuptools<81' > "$PIP_CONSTRAINT"
          pip install -e '.[dev]'

      - name: Pyright check
        uses: jakebailey/pyright-action@8ec14b5cfe41f26e5f41686a31eb6012758217ef
        with:
          level: warning
          warnings: true
          python-version: "3.10"
          project: pyproject.toml

  semgrep:
    if: ${{ github.actor != 'dependabot[bot]' }})
    needs: pre-commit
    runs-on: ubuntu-latest
    container:
      image: returntocorp/semgrep
    permissions:
      security-events: write
      actions: read
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0

      - name: Perform Semgrep Analysis
        run: semgrep scan -q --sarif --config auto --config "p/secrets" . > semgrep-results.sarif

      - name: Pretty-Print SARIF Output
        run: |
          jq . semgrep-results.sarif > formatted-semgrep-results.sarif || echo "{}"
          echo "Formatted SARIF Output (First 20 lines):"
          head -n 20 formatted-semgrep-results.sarif || echo "{}"

      - name: Validate JSON Output
        run: |
          if ! jq empty formatted-semgrep-results.sarif > /dev/null 2>&1; then
            echo "⚠️ Semgrep output is not valid JSON. Skipping annotations."
            exit 0
          fi

      - name: Add PR Annotations for Semgrep Findings
        run: |
          total_issues=$(jq '.runs[0].results | length' formatted-semgrep-results.sarif)
          if [[ "$total_issues" -eq 0 ]]; then
            echo "✅ No Semgrep issues found!"
            exit 0
          fi

          jq -c '.runs[0].results[]' formatted-semgrep-results.sarif | while IFS= read -r issue; do
            file=$(echo "$issue" | jq -r '.locations[0].physicalLocation.artifactLocation.uri')
            line=$(echo "$issue" | jq -r '.locations[0].physicalLocation.region.startLine')
            message=$(echo "$issue" | jq -r '.message.text')

            if [[ -n "$file" && -n "$line" && -n "$message" ]]; then
              echo "::error file=$file,line=$line,title=Semgrep Issue::${message}"
            fi
          done

  tests:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
        group: [1, 2, 3, 4, 5, 6]

    needs: [type-check, semgrep]
    runs-on: ${{ matrix.os }}

    env:
      AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
      AWS_S3_ENDPOINT_URL: ${{ secrets.AWS_S3_ENDPOINT_URL }}
      ROBOFLOW_API_KEY: ${{ secrets.ROBOFLOW_API_KEY }}
      ULTRALYTICS_API_KEY: ${{ secrets.ULTRALYTICS_API_KEY }}
      LUXONISML_BUCKET: luxonis-test-bucket
      GHC_ENABLED: ${{ secrets.GCP_CREDENTIALS != null }}

    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
        with:
          ref: ${{ github.head_ref }}

      - name: Set up Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1
        with:
          python-version: "3.10"
          cache: pip

      - name: Restore pytest durations
        uses: actions/cache/restore@55cc8345863c7cc4c66a329aec7e433d2d1c52a9
        with:
          path: .pytest-durations
          key: pytest-durations-${{ matrix.os }}-${{ github.run_id }}
          restore-keys: |
            pytest-durations-${{ matrix.os }}-

      - name: Install the package
        shell: bash
        env:
          PIP_CONSTRAINT: ${{ github.workspace }}/constraints.txt
        run: |
          echo 'setuptools<81' > "$PIP_CONSTRAINT"
          pip install 'pillow-heif<0.22.0'
          pip install -e '.[dev]'

      - name: Authenticate to Google Cloud
        if: ${{ env.GHC_ENABLED }}
        id: google-auth
        uses: google-github-actions/auth@7c6bc770dae815cd3e89ee6cdf493a5fab2cc093
        with:
          credentials_json: ${{ secrets.GCP_CREDENTIALS }}
          create_credentials_file: true
          export_environment_variables: true
          token_format: access_token

      - name: Check dead fixtures
        run: pytest --dead-fixtures

      - name: Run pytest
        shell: bash
        run: |
          junit_xml="junit-${{ matrix.os }}-${{ matrix.group }}.xml"
          mkdir -p .pytest-durations
          durations_path=".pytest-durations/.test_durations.${{ matrix.os }}"
          pytest_args=(
            --splits 6
            --group "${{ matrix.group }}"
            --durations-path "$durations_path"
            --splitting-algorithm duration_based_chunks
            --junitxml "$junit_xml"
            -o junit_family=legacy
            -vv
            -n auto
            -x
          )

          if [[ "${{ matrix.os }}" == "ubuntu-latest" ]]; then
            coverage_xml="coverage-${{ matrix.os }}-${{ matrix.group }}.xml"
            pytest --cov --cov-report term-missing --cov-report "xml:$coverage_xml" "${pytest_args[@]}"
          else
            pytest "${pytest_args[@]}"
          fi

      - name: Upload test result artifact
        if: ${{ always() }}
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        with:
          name: junit-${{ matrix.os }}-${{ matrix.group }}
          path: junit-${{ matrix.os }}-${{ matrix.group }}.xml
          if-no-files-found: ignore

      - name: Upload test results to Codecov
        if: ${{ always() && matrix.os == 'ubuntu-latest' }}
        uses: codecov/test-results-action@0fa95f0e1eeaafde2c782583b36b28ad0d8c77d3
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          fail_ci_if_error: false
          files: junit-${{ matrix.os }}-${{ matrix.group }}.xml
          flags: pytest-${{ matrix.os }}
          name: pytest-${{ matrix.os }}-${{ matrix.group }}
          disable_search: true
          handle_no_reports_found: true

      - name: Upload coverage results to Codecov
        if: ${{ always() && matrix.os == 'ubuntu-latest' }}
        uses: codecov/codecov-action@fb8b3582c8e4def4969c97caa2f19720cb33a72f
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          fail_ci_if_error: false
          files: coverage-${{ matrix.os }}-${{ matrix.group }}.xml
          flags: pytest-${{ matrix.os }}
          name: pytest-${{ matrix.os }}-${{ matrix.group }}
          disable_search: true
          handle_no_reports_found: true

      - name: Upload coverage as artifact
        if: ${{ always() && matrix.os == 'ubuntu-latest'  }}
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        with:
          name: coverage-${{ matrix.os }}-${{ matrix.group }}
          path: coverage-${{ matrix.os }}-${{ matrix.group }}.xml
          if-no-files-found: ignore
          overwrite: true

  check-requirements:
    if: ${{ startsWith(github.head_ref, 'release/') }}
    runs-on: ubuntu-latest

    strategy:
      matrix:
        submodule: ["data", "nn_archive", "utils"]

    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
        with:
          ref: ${{ github.head_ref }}

      - name: Set up Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1
        with:
          python-version: "3.10"
          cache: pip

      - name: Install the package
        run: pip install -e .[${{ matrix.submodule }}]

      - name: Check requirements
        run: python3 -c 'from luxonis_ml.${{ matrix.submodule }} import *'
